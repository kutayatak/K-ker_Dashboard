kind = "web"
previewPath = "/"
title = "Smart Dispatch Dashboard"
version = "1.0.0"
id = "artifacts/dispatch-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25833

[services.development]
run = "pnpm --filter @workspace/dispatch-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dispatch-dashboard", "run", "build" ]
publicDir = "artifacts/dispatch-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25833"
BASE_PATH = "/"
